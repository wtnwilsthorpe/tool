<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --urgent: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            letter-spacing: -1px;
            color: var(--accent);
        }

        .input-group {
            margin-bottom: 3rem;
            position: relative;
        }

        input {
            background: var(--card-bg);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            color: var(--text-main);
            font-size: 1.5rem;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
            text-align: center;
        }

        input:focus {
            border-color: var(--accent);
        }

        .visualizer {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SVG Pie Chart Styling */
        svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .bg-circle {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 8;
        }

        .pie-slice {
            fill: none;
            stroke: var(--accent);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
        }

        .digital-display {
            position: absolute;
            font-size: 4rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: var(--text-main);
        }

        .status-text {
            color: var(--text-dim);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1rem;
        }

        .hidden {
            display: none;
        }

        .urgent {
            stroke: var(--urgent);
        }
        
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="setup-screen">
        <h1>Set Focus Timer</h1>
        <div class="input-group">
            <input type="number" id="minutes-input" placeholder="Enter minutes..." autofocus>
            <p class="status-text">Press Enter to Start</p>
        </div>
    </div>

    <div class="container hidden" id="timer-screen">
        <h1 id="timer-title"></h1>
        
        <div class="visualizer">
            <svg viewBox="0 0 100 100">
                <circle class="bg-circle" cx="50" cy="50" r="45"></circle>
                <circle id="pie" class="pie-slice" cx="50" cy="50" r="45"></circle>
            </svg>
            <div class="digital-display" id="display">00:00</div>
        </div>

        <div class="status-text" id="status">Time Remaining</div>
        <p style="margin-top: 2rem; color: var(--text-dim); cursor: pointer;" onclick="resetTimer()">Click to Reset</p>
    </div>

    <script>
        const input = document.getElementById('minutes-input');
        const setupScreen = document.getElementById('setup-screen');
        const timerScreen = document.getElementById('timer-screen');
        const display = document.getElementById('display');
        const pie = document.getElementById('pie');
        const statusText = document.getElementById('status');
        
        let countdown;
        let totalSeconds;
        let remainingSeconds;
        
        // SVG circumference for r=45
        const circumference = 2 * Math.PI * 45;
        pie.style.strokeDasharray = circumference;

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const mins = parseFloat(input.value);
                if (isNaN(mins) || mins <= 0) return;
                
                startTimer(mins);
            }
        });

        function startTimer(minutes) {
            totalSeconds = Math.floor(minutes * 60);
            remainingSeconds = totalSeconds;
            
            setupScreen.classList.add('hidden');
            timerScreen.classList.remove('hidden');
            
            updateDisplay();
            
            countdown = setInterval(() => {
                remainingSeconds--;
                
                if (remainingSeconds <= 0) {
                    clearInterval(countdown);
                    remainingSeconds = 0;
                    timerFinished();
                }
                
                updateDisplay();
            }, 1000);
        }

        function updateDisplay() {
            // Digital display
            const mins = Math.floor(remainingSeconds / 60);
            const secs = remainingSeconds % 60;
            display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            // Pie visual
            const percentage = remainingSeconds / totalSeconds;
            const offset = circumference - (percentage * circumference);
            pie.style.strokeDashoffset = offset;

            // Urgent styling (less than 10% or 10 seconds)
            if (remainingSeconds < 10 || percentage < 0.1) {
                pie.classList.add('urgent');
            } else {
                pie.classList.remove('urgent');
            }
        }

        function timerFinished() {
            statusText.innerText = "Time Expired";
            statusText.style.color = "var(--urgent)";
            display.classList.add('pulse');
            document.getElementById('timer-title').innerText = "Session Complete";
        }

        function resetTimer() {
            clearInterval(countdown);
            setupScreen.classList.remove('hidden');
            timerScreen.classList.add('hidden');
            display.classList.remove('pulse');
            statusText.innerText = "Time Remaining";
            statusText.style.color = "var(--text-dim)";
            document.getElementById('timer-title').innerText = "Time remaining:";
            input.value = '';
            input.focus();
        }
    </script>
</body>
</html>
