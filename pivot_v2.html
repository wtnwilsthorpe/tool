<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Pivot Table Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
        }
        .custom-table th, .custom-table td {
            border: 1px solid #cbd5e1;
            padding: 10px 14px;
            text-align: center;
        }
        .custom-table th {
            background-color: #f1f5f9;
            font-weight: 700;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="border-b-4 border-indigo-600 pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tight text-indigo-900">Dynamic Pivot Generator</h1>
                <p class="text-sm text-slate-500 font-medium">Replicate Excel's <code class="bg-slate-200 px-1 py-0.5 rounded font-mono text-xs">PIVOTBY</code> in your browser</p>
            </div>
            <button onclick="loadSampleData()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-800 text-xs font-bold px-4 py-2 rounded-lg transition">
                Load Sample Timetable Data
            </button>
        </header>

        <!-- Main Grid Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Panel: Input & Mapping -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- Step 1: Input Data -->
                <div class="bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-sm">
                    <h2 class="font-bold text-slate-800 mb-3 flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs font-black">1</span>
                        Paste Raw Data
                    </h2>
                    <p class="text-xs text-slate-400 mb-2">Provide CSV or Tab-Separated columns with a header row.</p>
                    <textarea id="rawData" class="w-full h-48 p-3 border border-slate-200 rounded-xl font-mono text-xs outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Column1,Column2,Column3..."></textarea>
                    
                    <button onclick="parseInputData()" class="w-full mt-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition text-sm">
                        Process Columns
                    </button>
                </div>

                <!-- Step 2: Mapping Configuration -->
                <div class="bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-sm space-y-4">
                    <h2 class="font-bold text-slate-800 flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs font-black">2</span>
                        Configure Pivot Rules
                    </h2>
                    
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Row Headers (Y-Axis)</label>
                        <select id="rowSelect" class="w-full p-2 border border-slate-200 rounded-lg text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500"></select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Column Headers (X-Axis)</label>
                        <select id="colSelect" class="w-full p-2 border border-slate-200 rounded-lg text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500"></select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Intersecting Values</label>
                        <select id="valSelect" class="w-full p-2 border border-slate-200 rounded-lg text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500"></select>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="generatePivotTable()" class="flex-grow bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-100 text-sm">
                            GENERATE TABLE Grid
                        </button>
                        <button onclick="swapAxes()" class="px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 border-2 border-slate-200 rounded-xl transition text-sm font-bold flex items-center justify-center" title="Swap Rows and Columns">
                            ⇄ Swap
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Dynamic Pivot Output -->
            <div class="lg:col-span-8 space-y-6">
                
                <!-- Display Grid -->
                <div class="bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-sm min-h-[400px] flex flex-col">
                    <h3 class="text-xs font-black uppercase text-slate-400 tracking-wider mb-4">Output Preview</h3>
                    
                    <div id="pivotContainer" class="overflow-x-auto w-full flex-grow flex items-center justify-center">
                        <div class="text-center text-slate-400">
                            <span class="text-5xl block mb-2">📊</span>
                            <p class="font-bold">Waiting for configuration...</p>
                            <p class="text-xs mt-1">Paste your data, map the attributes, and run the pivot engine.</p>
                        </div>
                    </div>
                </div>

                <!-- Error Messages Box -->
                <div id="errorBox" class="hidden p-4 bg-red-50 text-red-700 border border-red-200 rounded-xl text-sm font-medium"></div>

            </div>
        </div>
    </div>

    <script>
        let parsedHeaders = [];
        let parsedRows = [];

        const sampleData = `Lesson,Teacher,Class\nATue:2,BAR,08a/Sc3\nATue:3,BAR,08b/Sc4\nATue:4,BAR,07a/Sc4\nATue:5,BAR,09b/Sc4\nAWed:1,BAR,07b/Sc1\nAWed:2,BAR,07a/Sc3\nAWed:3,BAR,09b/Sc4\nAWed:4,BAR,08b/Sc4\nAWed:5,BAR,11ab/Ch1\nAThu:1,BAR,07b/Sc1\nAThu:2,BAR,07a/Sc4\nAThu:3,BAR,08b/Sc4\nAFri:1,BAR,08b/Sc4`;

        function loadSampleData() {
            document.getElementById('rawData').value = sampleData;
            parseInputData();
        }

        function parseInputData() {
            const rawText = document.getElementById('rawData').value.trim();
            const errorBox = document.getElementById('errorBox');
            errorBox.classList.add('hidden');

            if (!rawText) {
                showError("Please paste some structured data first.");
                return;
            }

            // Split lines and parse separator (comma, tab, or semicolon)
            const lines = rawText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            if (lines.length < 2) {
                showError("Data needs to contain at least a header row and one data row.");
                return;
            }

            let delimiter = ',';
            if (lines[0].includes('\t')) {
                delimiter = '\t';
            } else if (lines[0].includes(';')) {
                delimiter = ';';
            }
            
            parsedHeaders = lines[0].split(delimiter).map(h => h.trim());
            
            parsedRows = [];
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(delimiter).map(v => v.trim());
                if (values.length === parsedHeaders.length) {
                    let rowObj = {};
                    parsedHeaders.forEach((header, idx) => {
                        rowObj[header] = values[idx];
                    });
                    parsedRows.push(rowObj);
                }
            }

            populateSelectors();
        }

        function populateSelectors() {
            const rowSelect = document.getElementById('rowSelect');
            const colSelect = document.getElementById('colSelect');
            const valSelect = document.getElementById('valSelect');

            rowSelect.innerHTML = '';
            colSelect.innerHTML = '';
            valSelect.innerHTML = '';

            parsedHeaders.forEach((header, idx) => {
                const opt1 = new Option(header, header);
                const opt2 = new Option(header, header);
                const opt3 = new Option(header, header);

                rowSelect.add(opt1);
                colSelect.add(opt2);
                valSelect.add(opt3);

                // Set sensible default indexes
                if (idx === 0) opt1.selected = true;
                if (idx === parsedHeaders.length - 1) opt2.selected = true;
                if (idx === 1 && parsedHeaders.length > 2) opt3.selected = true;
            });
        }

        function swapAxes() {
            const rowSelect = document.getElementById('rowSelect');
            const colSelect = document.getElementById('colSelect');
            if (!rowSelect.value || !colSelect.value) return;
            
            const temp = rowSelect.value;
            rowSelect.value = colSelect.value;
            colSelect.value = temp;
            
            generatePivotTable();
        }

        function generatePivotTable() {
            const rowField = document.getElementById('rowSelect').value;
            const colField = document.getElementById('colSelect').value;
            const valField = document.getElementById('valSelect').value;
            const container = document.getElementById('pivotContainer');
            const errorBox = document.getElementById('errorBox');

            errorBox.classList.add('hidden');

            if (parsedRows.length === 0) {
                showError("No parsed data found. Please run Step 1 first.");
                return;
            }

            if (rowField === colField) {
                showError("Row Field and Column Field must be different to form a grid matrix.");
                return;
            }

            // Remove centering classes to prevent table crushing
            container.className = "overflow-x-auto w-full flex-grow block";

            // Extract Unique Sorted Rows and Columns
            const uniqueRows = [...new Set(parsedRows.map(r => r[rowField]))].sort();
            const uniqueCols = [...new Set(parsedRows.map(r => r[colField]))].sort();

            // Build Matrix table
            let tableHtml = `<table class="custom-table w-full text-sm border-collapse shadow-sm rounded-lg overflow-hidden">`;
            
            // Header Row
            tableHtml += `<thead><tr><th class="bg-indigo-50 text-indigo-900 border-2 border-indigo-100 font-black">${rowField} \\ ${colField}</th>`;
            uniqueCols.forEach(col => {
                tableHtml += `<th>${col}</th>`;
            });
            tableHtml += `</tr></thead><tbody>`;

            // Data Rows
            uniqueRows.forEach(rowVal => {
                tableHtml += `<tr><td class="font-bold bg-slate-50 text-slate-700">${rowVal}</td>`;
                
                uniqueCols.forEach(colVal => {
                    // Filter matching entries
                    const matches = parsedRows.filter(r => r[rowField] === rowVal && r[colField] === colVal);
                    if (matches.length > 0) {
                        // Display matching values (joining if multiple, e.g. "BAR, JON")
                        const values = matches.map(m => m[valField]).filter(v => v);
                        const uniqueValues = [...new Set(values)];
                        tableHtml += `<td class="bg-emerald-50/50 text-emerald-800 font-semibold transition-all duration-300">${uniqueValues.join(', ')}</td>`;
                    } else {
                        tableHtml += `<td class="text-slate-300 italic">-</td>`;
                    }
                });
                tableHtml += `</tr>`;
            });

            tableHtml += `</tbody></table>`;
            container.innerHTML = tableHtml;
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
