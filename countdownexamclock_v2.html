<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 11 GCSE Countdown</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --urgent: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            color: var(--accent);
            text-align: center;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-dim);
            margin-bottom: 3rem;
            text-align: center;
        }

        .countdown-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 4rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            min-width: 140px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-value {
            font-size: 4rem;
            font-weight: 800;
            display: block;
            line-height: 1;
        }

        .time-label {
            font-size: 1rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }

        .school-days-box {
            background: rgba(56, 189, 248, 0.1);
            border: 2px solid var(--accent);
            padding: 1.5rem 3rem;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
        }

        .highlight {
            color: var(--accent);
        }

        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .time-card { min-width: 80px; padding: 1rem; }
            .time-value { font-size: 2rem; }
            .school-days-box { font-size: 1.2rem; padding: 1rem 2rem; }
        }
    </style>
</head>
<body>

    <h1>GCSE ENGLISH LITERATURE PAPER 1</h1>
    <div class="subtitle">Monday 11 May 2026 | 09:00 AM</div>

    <div class="countdown-container">
        <div class="time-card">
            <span class="time-value" id="weeks">00</span>
            <span class="time-label">Weeks</span>
        </div>
        <div class="time-card">
            <span class="time-value" id="days">00</span>
            <span class="time-label">Days</span>
        </div>
        <div class="time-card">
            <span class="time-value" id="hours">00</span>
            <span class="time-label">Hours</span>
        </div>
        <div class="time-card">
            <span class="time-value" id="minutes">00</span>
            <span class="time-label">Mins</span>
        </div>
    </div>

    <div class="school-days-box">
        Only <span id="school-days" class="highlight">--</span> School Days Remaining
    </div>

    <script>
        const targetDate = new Date('May 11, 2026 09:00:00');
        
        // Holiday Settings
        const easterStart = new Date('March 27, 2026');
        const easterEnd = new Date('April 12, 2026');
        const bankHoliday = new Date('May 4, 2026').toDateString();

        function updateCountdown() {
            const now = new Date();
            
            // Fix for DST: Calculate total difference in minutes by comparing UTC offsets
            let diffMs = targetDate.getTime() - now.getTime();
            
            // Adjust for the difference in Timezone Offsets between "now" and "target"
            // This ensures we show "clock time" difference rather than absolute physics difference
            const offsetDiff = (now.getTimezoneOffset() - targetDate.getTimezoneOffset()) * 60 * 1000;
            const adjustedDistance = diffMs + offsetDiff;

            if (adjustedDistance < 0) {
                document.querySelector('.countdown-container').innerHTML = "<h2>Exam in Progress or Finished</h2>";
                return;
            }

            // Time Calculations
            const weeks = Math.floor(adjustedDistance / (1000 * 60 * 60 * 24 * 7));
            const days = Math.floor((adjustedDistance % (1000 * 60 * 60 * 24 * 7)) / (1000 * 60 * 60 * 24));
            const hours = Math.floor((adjustedDistance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((adjustedDistance % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('weeks').innerText = weeks.toString().padStart(2, '0');
            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');

            // School Days Calculation
            let schoolDaysCount = 0;
            let current = new Date(now);
            current.setHours(0,0,0,0);

            const targetMidnight = new Date(targetDate);
            targetMidnight.setHours(0,0,0,0);

            while (current < targetMidnight) {
                const dayOfWeek = current.getDay();
                const isWeekend = (dayOfWeek === 6 || dayOfWeek === 0);
                const isEaster = (current >= easterStart && current <= easterEnd);
                const isBankHoliday = (current.toDateString() === bankHoliday);

                if (!isWeekend && !isEaster && !isBankHoliday) {
                    schoolDaysCount++;
                }
                current.setDate(current.getDate() + 1);
            }
            document.getElementById('school-days').innerText = schoolDaysCount;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
