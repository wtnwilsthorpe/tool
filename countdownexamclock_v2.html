<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 11 GCSE Countdown - High Visibility</title>
    <style>
        :root {
            /* High contrast colors for dim screens */
            --bg-color: #000000;
            --card-bg: #111111;
            --accent: #ffff00; /* Neon Yellow for maximum visibility */
            --text-main: #ffffff;
            --text-dim: #cccccc;
            --glow: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        h1 {
            font-size: 5rem; /* Massive size */
            font-weight: 900;
            margin: 0;
            color: var(--text-main);
            text-align: center;
            line-height: 1;
            text-shadow: 0 0 20px var(--glow);
        }

        .subtitle {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 2rem;
            font-weight: 800;
            text-align: center;
        }

        .countdown-container {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            justify-content: center;
            width: 95%;
        }

        .time-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            flex: 1;
            max-width: 300px;
            text-align: center;
            border: 4px solid #333; /* Thick border to define shape */
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .time-value {
            font-size: 8rem; /* Extremely large numbers */
            font-weight: 900;
            display: block;
            line-height: 0.9;
            color: var(--text-main);
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .time-label {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            margin-top: 1rem;
            letter-spacing: 4px;
        }

        .school-days-box {
            background: #111;
            border: 6px solid var(--accent);
            padding: 2rem 5rem;
            border-radius: 100px;
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.2);
        }

        .highlight {
            color: var(--accent);
            font-size: 5rem;
        }

        /* Fullscreen-friendly adjustments */
        @media (max-width: 1200px) {
            h1 { font-size: 3rem; }
            .time-value { font-size: 5rem; }
            .school-days-box { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <h1>GCSE ENGLISH LITERATURE</h1>
    <div class="subtitle">MONDAY 11 MAY 2026 | 09:00 AM</div>

    <div class="countdown-container">
        <div class="time-card">
            <span class="time-value" id="weeks">00</span>
            <span class="time-label">WEEKS</span>
        </div>
        <div class="time-card">
            <span class="time-value" id="days">00</span>
            <span class="time-label">DAYS</span>
        </div>
        <div class="time-card">
            <span class="time-value" id="hours">00</span>
            <span class="time-label">HOURS</span>
        </div>
        <div class="time-card">
            <span class="time-value" id="minutes">00</span>
            <span class="time-label">MINS</span>
        </div>
    </div>

    <div class="school-days-box">
        <span id="school-days" class="highlight">--</span> SCHOOL DAYS LEFT
    </div>

    <script>
        const targetDate = new Date('May 11, 2026 09:00:00');
        
        // Holiday Settings
        const easterStart = new Date('March 27, 2026');
        const easterEnd = new Date('April 12, 2026');
        const bankHoliday = new Date('May 4, 2026').toDateString();

        function updateCountdown() {
            const now = new Date();
            
            let diffMs = targetDate.getTime() - now.getTime();
            const offsetDiff = (now.getTimezoneOffset() - targetDate.getTimezoneOffset()) * 60 * 1000;
            const adjustedDistance = diffMs + offsetDiff;

            if (adjustedDistance < 0) {
                document.querySelector('.countdown-container').innerHTML = "<h2 style='font-size: 5rem;'>EXAM IN PROGRESS</h2>";
                return;
            }

            // Time Calculations
            const weeks = Math.floor(adjustedDistance / (1000 * 60 * 60 * 24 * 7));
            const days = Math.floor((adjustedDistance % (1000 * 60 * 60 * 24 * 7)) / (1000 * 60 * 60 * 24));
            const hours = Math.floor((adjustedDistance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((adjustedDistance % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('weeks').innerText = weeks.toString().padStart(2, '0');
            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');

            // School Days Calculation
            let schoolDaysCount = 0;
            let current = new Date(now);
            current.setHours(0,0,0,0);

            const targetMidnight = new Date(targetDate);
            targetMidnight.setHours(0,0,0,0);

            while (current < targetMidnight) {
                const dayOfWeek = current.getDay();
                const isWeekend = (dayOfWeek === 6 || dayOfWeek === 0);
                const isEaster = (current >= easterStart && current <= easterEnd);
                const isBankHoliday = (current.toDateString() === bankHoliday);

                if (!isWeekend && !isEaster && !isBankHoliday) {
                    schoolDaysCount++;
                }
                current.setDate(current.getDate() + 1);
            }
            document.getElementById('school-days').innerText = schoolDaysCount;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
